###############################################################################
# MediaMTX baseline config — used by both local runs (start.ps1) and the
# docker-compose stack.
#
# Paths are NOT defined here — the backend creates / patches them via
# MediaMTX's HTTP control API (:9997) on startup and after every inventory
# edit. This file only sets server-wide knobs (listeners, log level, perf).
###############################################################################

###############################################################################
# SECURITY NOTE — read/playback is currently ANONYMOUS.
#
# The control API (:9997) stays internal (never published by docker-compose),
# but RTSP (:8554), WebRTC (:8889) and HLS (:8888) are published and accept
# anonymous reads — anyone who can reach those ports can pull any camera.
# This is acceptable only on a trusted LAN or behind an authenticating ingress
# (nginx). To lock playback down, add an `authInternalUsers` block restricting
# `read` to known users/IPs — note the browser WHEP/HLS players in web/js must
# then be updated to send matching credentials.
###############################################################################

logLevel: warn
logDestinations: [stdout]

# Match writes from many RTSP source connections + N WHEP readers without
# back-pressure stalls.
writeQueueSize: 4096

# HTTP control API used by backend's MediaMTXClient.
api: yes
apiAddress: :9997

# RTSP server — used by MediaMTX to PULL from NVRs, and (optionally) to
# expose paths to RTSP clients on the LAN.
rtsp: yes
rtspAddress: :8554
rtspTransports: [tcp]

# WebRTC (WHEP) for low-latency browser playback.
webrtc: yes
webrtcAddress: :8889
# These hosts are advertised in ICE candidates — operators connect to them
# directly. Set WEBRTCADDITIONALHOSTS to your public hostname / IP via env.
webrtcAdditionalHosts: []

# Low-latency HLS as the fallback path.
hls: yes
hlsAddress: :8888
hlsVariant: lowLatency
hlsSegmentCount: 3
hlsSegmentDuration: 1s
hlsPartDuration: 200ms

# No paths block — backend manages them dynamically.
paths: {}
