<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSS — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #0b0c0f; --bg-3: #15171c; --bg-4: #181a20; --bg-5: #1e2128;
      --line-2: #272b33; --tx-1: #cdd0d6; --tx-2: #9ba0a8;
      --acc: #ff5a5f; --acc-strong: #ff7174; --acc-press: #e84a50;
      --acc-tint: rgba(255,90,95,.13); --acc-glow: rgba(255,90,95,.38);
      --err: #f85149;
      --font-ui: "Manrope", -apple-system, "Segoe UI", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; color: var(--tx-1);
      font-family: var(--font-ui);
      background:
        radial-gradient(900px 500px at 50% -8%, rgba(255,90,95,.10), transparent 60%),
        radial-gradient(700px 500px at 90% 110%, rgba(255,90,95,.05), transparent 60%),
        var(--bg-0);
      -webkit-font-smoothing: antialiased; }
    body { min-height: 100vh; min-height: 100dvh; display: grid; place-items: center; padding: 24px; }
    .card { width: 340px; padding: 30px 28px; border-radius: 14px;
      background: linear-gradient(180deg, #16181e, var(--bg-3));
      border: 1px solid var(--line-2);
      box-shadow: 0 24px 70px -20px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.02) inset;
      animation: rise .5s cubic-bezier(.4,0,.2,1) both; }
    @keyframes rise { from { opacity: 0; transform: translateY(14px) scale(.98); } to { opacity: 1; transform: none; } }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .brand .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--acc);
      box-shadow: 0 0 12px var(--acc-glow); animation: beat 2.6s ease infinite; }
    @keyframes beat { 0% { box-shadow: 0 0 0 0 var(--acc-glow); } 60% { box-shadow: 0 0 0 7px rgba(255,90,95,0); } 100% { box-shadow: 0 0 0 0 rgba(255,90,95,0); } }
    h1 { margin: 0; font-size: 26px; font-weight: 800; letter-spacing: 2px;
      background: linear-gradient(135deg, var(--acc-strong), var(--acc));
      -webkit-background-clip: text; background-clip: text; color: transparent; }
    .sub { margin: 2px 0 18px 19px; font-size: 12px; color: var(--tx-2); letter-spacing: .4px; }
    label { display: block; font-size: 11px; color: var(--tx-2); margin: 14px 0 5px;
      text-transform: uppercase; letter-spacing: .8px; font-weight: 600; }
    input { width: 100%; padding: 10px 12px; background: var(--bg-0); color: #fff;
      border: 1px solid var(--line-2); border-radius: 8px; font-size: 14px;
      font-family: inherit; outline: none;
      transition: border-color .14s ease, box-shadow .14s ease; }
    input:focus { border-color: var(--acc); box-shadow: 0 0 0 3px var(--acc-tint); }
    button { width: 100%; margin-top: 22px; padding: 11px; color: #fff; border: 0;
      border-radius: 8px; font-size: 14px; font-weight: 700; font-family: inherit;
      letter-spacing: .3px; cursor: pointer;
      background: linear-gradient(135deg, var(--acc-strong), var(--acc));
      box-shadow: 0 8px 20px -8px var(--acc-glow);
      transition: transform .14s ease, box-shadow .14s ease, background .14s ease; }
    button:hover { transform: translateY(-1px); background: linear-gradient(135deg, var(--acc), var(--acc-press)); box-shadow: 0 12px 26px -8px var(--acc-glow); }
    button:active { transform: translateY(0); }
    button[disabled] { opacity: .6; cursor: wait; transform: none; }
    .err { margin-top: 12px; color: var(--err); font-size: 12px; min-height: 16px; }
    .change { margin-top: 8px; font-size: 12px; color: var(--tx-2); }
  </style>
</head>
<body>
  <form class="card" id="login-form" autocomplete="on">
    <div class="brand"><span class="dot"></span><h1>DSS</h1></div>
    <div class="sub">Surveillance console</div>
    <label for="username">Username</label>
    <input id="username" name="username" type="text" autocomplete="username" required autofocus>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
    <div id="change-block" style="display:none">
      <label for="new-password">New password</label>
      <input id="new-password" type="password" autocomplete="new-password" minlength="8">
      <div class="change">Password change required on first login.</div>
    </div>
    <button id="submit" type="submit">Sign in</button>
    <div id="err" class="err"></div>
  </form>

  <script type="module">
    import { login, changePassword } from "./js/api.js";
    import { dlog } from "./js/logger.js";

    const form = document.getElementById("login-form");
    const btn = document.getElementById("submit");
    const errEl = document.getElementById("err");
    const changeBlock = document.getElementById("change-block");

    dlog.info("", "login-page-loaded", `ua=${navigator.userAgent.slice(0, 120)}`);

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errEl.textContent = "";
      btn.disabled = true;
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const newPw = document.getElementById("new-password").value;

      try {
        const { mustChange } = await login(username, password);
        if (mustChange && !newPw) {
          dlog.info("", "login-must-change-password", `user=${username}`);
          changeBlock.style.display = "";
          btn.textContent = "Set new password & continue";
          errEl.textContent = "Please choose a new password.";
          btn.disabled = false;
          return;
        }
        if (mustChange && newPw) {
          dlog.info("", "login-changing-password", `user=${username}`);
          await changePassword(password, newPw);
        }
        dlog.info("", "login-redirect", "→ /index.html");
        dlog.flush();
        location.href = "/index.html";
      } catch (err) {
        dlog.error("", "login-submit-fail", `user=${username}: ${String(err.message || err)}`);
        errEl.textContent = String(err.message || err);
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
