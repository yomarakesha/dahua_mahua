<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSS — Discover NVRs</title>
  <style>
    html, body { margin: 0; background: #181a20; color: #e6e6e6;
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif; font-size: 13px; }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 18px; margin: 0 0 16px; letter-spacing: .5px; }
    .nav { font-size: 12px; color: #9aa0a6; margin-bottom: 16px; }
    .nav a { color: #4a90e2; text-decoration: none; }
    .card { background: #20232a; border-radius: 8px; padding: 16px; margin-bottom: 16px;
      box-shadow: 0 1px 3px rgba(0,0,0,.3); }
    .row { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 11px; color: #9aa0a6; text-transform: uppercase; letter-spacing: .5px; }
    input, select { padding: 6px 8px; background: #15171c; color: #fff;
      border: 1px solid #2c2f36; border-radius: 4px; font-size: 13px; }
    input[type=checkbox] { width: 14px; height: 14px; }
    button { padding: 7px 14px; background: #4a90e2; color: #fff; border: 0;
      border-radius: 4px; font-size: 13px; cursor: pointer; }
    button.secondary { background: #2c2f36; }
    button[disabled] { opacity: .6; cursor: wait; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #2c2f36;
      vertical-align: middle; }
    th { font-size: 11px; color: #9aa0a6; text-transform: uppercase;
      letter-spacing: .5px; font-weight: normal; }
    tr.dim td { color: #6c7079; }
    .badge { display: inline-block; padding: 2px 6px; border-radius: 3px;
      font-size: 10px; background: #2c2f36; color: #9aa0a6; margin-right: 4px; }
    .badge.onvif { background: #2d4a2d; color: #8fdc8f; }
    .badge.tcp   { background: #2d3e4a; color: #8fb6dc; }
    .badge.known { background: #4a2d2d; color: #dc8f8f; }
    .status { font-size: 12px; color: #9aa0a6; }
    .status.err { color: #ff7878; }
    .status.ok  { color: #8fdc8f; }
    .summary { padding: 12px 0; font-size: 12px; }
    .scroll-h { overflow-x: auto; }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <a href="/index.html">← Dashboard</a>
    </div>
    <h1>Discover NVRs on the LAN</h1>

    <!-- Scan controls -->
    <div class="card">
      <div class="row">
        <div class="field" style="min-width: 180px">
          <label>CIDR (leave blank = autodetect /24)</label>
          <input id="cidr" type="text" placeholder="192.168.1.0/24">
        </div>
        <div class="field">
          <label>Default RTSP user</label>
          <input id="user" type="text" value="admin" style="width: 110px">
        </div>
        <div class="field">
          <label>Default RTSP password</label>
          <input id="pass" type="password" style="width: 140px">
        </div>
        <div class="field">
          <label>Region (optional)</label>
          <select id="region"></select>
        </div>
        <label style="display: flex; gap: 6px; align-items: center;">
          <input id="onvif" type="checkbox" checked> ONVIF
        </label>
        <label style="display: flex; gap: 6px; align-items: center;">
          <input id="tcp" type="checkbox" checked> TCP scan
        </label>
        <label style="display: flex; gap: 6px; align-items: center;">
          <input id="test-first" type="checkbox" checked> Test creds before import
        </label>
        <button id="scan-btn">Scan</button>
        <span id="scan-status" class="status"></span>
      </div>
    </div>

    <!-- Results -->
    <div class="card scroll-h">
      <div class="row" style="justify-content: space-between; margin-bottom: 8px;">
        <div class="summary">
          <span id="result-count">No scan run yet.</span>
        </div>
        <div>
          <button id="select-all" class="secondary">Select all new</button>
          <button id="import-btn">Add selected</button>
        </div>
      </div>
      <table id="results">
        <thead>
          <tr>
            <th style="width: 28px"></th>
            <th>IP</th>
            <th>Sources</th>
            <th>Vendor</th>
            <th>Channels</th>
            <th>Label</th>
            <th>Group</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="results-body">
          <tr><td colspan="8" style="color: #6c7079; padding: 16px 8px;">
            Press <b>Scan</b>. ONVIF takes ~3s; TCP /24 scan ~5-15s.
          </td></tr>
        </tbody>
      </table>
    </div>

    <!-- Import log -->
    <div class="card" id="import-log-card" style="display: none">
      <div class="summary"><b>Import results</b></div>
      <table>
        <thead>
          <tr><th>IP</th><th>NVR id</th><th>Status</th><th>Message</th></tr>
        </thead>
        <tbody id="import-log"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { discoveryScan, discoveryImport, listRegions, getToken } from "./js/api.js";

    if (!getToken()) location.href = "/login.html";

    const $ = (id) => document.getElementById(id);

    let lastCandidates = [];

    async function loadRegions() {
      try {
        const regs = await listRegions();
        const sel = $("region");
        sel.innerHTML = '<option value="">— none —</option>' +
          regs.map(r => `<option value="${r.id}">${r.name}</option>`).join("");
      } catch (e) {
        // Operator without admin won't see this page anyway, but be defensive.
        console.warn("Failed to load regions", e);
      }
    }

    async function runScan() {
      const btn = $("scan-btn");
      btn.disabled = true;
      $("scan-status").textContent = "Scanning…";
      $("scan-status").className = "status";
      try {
        const body = {
          cidr: $("cidr").value.trim() || null,
          onvif: $("onvif").checked,
          tcp: $("tcp").checked,
          rtsp_username: $("user").value || null,
          rtsp_password: $("pass").value || null,
          timeout: 3.0,
        };
        const res = await discoveryScan(body);
        lastCandidates = res.candidates;
        $("scan-status").textContent =
          `Done in ${res.duration_ms} ms. CIDR: ${res.cidr_used || "—"}.`;
        renderResults(res);
      } catch (e) {
        $("scan-status").textContent = String(e.message || e);
        $("scan-status").className = "status err";
      } finally {
        btn.disabled = false;
      }
    }

    function renderResults(res) {
      const body = $("results-body");
      $("result-count").textContent =
        `${res.candidates.length} host(s) found. ` +
        `${res.candidates.filter(c => c.already_known).length} already in inventory.`;
      if (res.candidates.length === 0) {
        body.innerHTML = `<tr><td colspan="8" style="color:#6c7079">No hosts answered. Check the CIDR and that your LAN is reachable.</td></tr>`;
        return;
      }
      body.innerHTML = res.candidates.map((c, i) => {
        const ch = c.detected_channels ?? 16;
        const lbl = c.label_hint || c.ip;
        const badges =
          c.sources.map(s => `<span class="badge ${s}">${s}</span>`).join("") +
          (c.already_known ? `<span class="badge known">already added</span>` : "");
        const dim = c.already_known ? "dim" : "";
        return `
          <tr class="${dim}" data-i="${i}">
            <td><input type="checkbox" class="pick" ${c.already_known ? "disabled" : ""}></td>
            <td>${c.ip}:${c.port}</td>
            <td>${badges}</td>
            <td>
              <select class="vendor">
                <option value="dahua" ${c.vendor_guess === "dahua" ? "selected" : ""}>dahua</option>
                <option value="hikvision" ${c.vendor_guess === "hikvision" ? "selected" : ""}>hikvision</option>
              </select>
            </td>
            <td><input type="number" class="channels" min="1" max="512" value="${ch}" style="width: 70px"></td>
            <td><input type="text" class="label" value="${escAttr(lbl)}" style="width: 180px"></td>
            <td><input type="text" class="group" value="" placeholder="optional" style="width: 100px"></td>
            <td class="status"></td>
          </tr>`;
      }).join("");
    }

    function escAttr(s) { return String(s).replace(/"/g, "&quot;"); }

    function selectAllNew() {
      document.querySelectorAll("#results-body tr").forEach(tr => {
        const cb = tr.querySelector(".pick");
        if (cb && !cb.disabled) cb.checked = true;
      });
    }

    async function runImport() {
      const rows = Array.from(document.querySelectorAll("#results-body tr"))
        .filter(tr => {
          const cb = tr.querySelector(".pick");
          return cb && cb.checked && !cb.disabled;
        });
      if (rows.length === 0) {
        alert("Nothing selected.");
        return;
      }
      const hosts = rows.map(tr => {
        const i = parseInt(tr.dataset.i, 10);
        const c = lastCandidates[i];
        return {
          ip: c.ip,
          port: c.port,
          vendor: tr.querySelector(".vendor").value,
          channels: parseInt(tr.querySelector(".channels").value, 10),
          label: tr.querySelector(".label").value.trim() || null,
          group: tr.querySelector(".group").value.trim() || null,
        };
      });

      const btn = $("import-btn");
      btn.disabled = true;
      try {
        const res = await discoveryImport({
          rtsp_username: $("user").value,
          rtsp_password: $("pass").value,
          region_id: $("region").value || null,
          test_first: $("test-first").checked,
          hosts,
        });
        $("import-log-card").style.display = "";
        $("import-log").innerHTML = res.map(r => `
          <tr>
            <td>${r.ip}</td>
            <td>${r.nvr_id || "—"}</td>
            <td class="status ${r.ok ? "ok" : "err"}">${r.ok ? "OK" : "FAIL"}</td>
            <td>${r.message}</td>
          </tr>
        `).join("");
        // Mark imported rows as dim so the user doesn't double-import.
        for (const r of res.filter(x => x.ok)) {
          const tr = Array.from(document.querySelectorAll("#results-body tr"))
            .find(t => t.children[1].textContent.startsWith(r.ip + ":"));
          if (tr) {
            tr.classList.add("dim");
            const cb = tr.querySelector(".pick");
            if (cb) { cb.checked = false; cb.disabled = true; }
          }
        }
      } catch (e) {
        alert("Import failed: " + (e.message || e));
      } finally {
        btn.disabled = false;
      }
    }

    $("scan-btn").addEventListener("click", runScan);
    $("select-all").addEventListener("click", selectAllNew);
    $("import-btn").addEventListener("click", runImport);

    loadRegions();
  </script>
</body>
</html>
