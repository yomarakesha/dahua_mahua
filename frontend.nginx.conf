# nginx in front of the static frontend.
#
# Three reverse-proxy rules let the browser hit one origin for everything,
# which keeps CORS quiet and means the docker network names don't leak out:
#
#   /api/*  → backend  (REST, JWT-protected)
#   /whep/* → MediaMTX :8889  (WebRTC signaling)
#   /hls/*  → MediaMTX :8888  (HLS playlists / segments)
#
# The frontend's config.js still talks to :8889 / :8888 directly by default.
# If you want to publish only :80, change CONFIG.webrtcBase / hlsBase to
# `${location.protocol}//${location.host}/whep` etc. and rely on these
# rewrites — TLS-terminating here also gets you WSS for free.

upstream dss_backend  { server backend:8000; }
upstream dss_webrtc   { server mediamtx:8889; }
upstream dss_hls      { server mediamtx:8888; }

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long client_max_body_size so SDP offers + small uploads pass without 413.
    client_max_body_size 4m;

    location /api/ {
        proxy_pass http://dss_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # MediaMTX WHEP endpoint — POST with SDP body. Buffering off so the
    # answer comes back immediately without nginx batching it.
    location /whep/ {
        rewrite ^/whep/(.*)$ /$1 break;
        proxy_pass http://dss_webrtc;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /hls/ {
        rewrite ^/hls/(.*)$ /$1 break;
        proxy_pass http://dss_hls;
        proxy_set_header Host $host;
        # LL-HLS partial segments need quick flushing.
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
        # Default cache off — frontend is small, we re-deploy often, and
        # operators reload after auth changes.
        add_header Cache-Control "no-store";
    }
}
